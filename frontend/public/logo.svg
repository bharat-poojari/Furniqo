<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient system (visible on both themes) -->
  <defs>
    <linearGradient id="furniqoGrad" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#6D28D9"/>  <!-- deep violet -->
  <stop offset="50%" stop-color="#BE185D"/> <!-- muted rose -->
  <stop offset="100%" stop-color="#D97706"/> <!-- soft amber -->
</linearGradient>

    <!-- subtle glow for dark/light -->
    <filter id="softGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Outer ring (brand container) -->
  <circle cx="128" cy="128" r="104"
          fill="none"
          stroke="url(#furniqoGrad)"
          stroke-width="10"
          filter="url(#softGlow)"/>

  <!-- Main "F" (bold, clean, scalable) -->
  <path
    d="M90 70 
       H170 
       Q185 70 185 85 
       Q185 100 170 100 
       H120 
       V120 
       H160 
       Q175 120 175 135 
       Q175 150 160 150 
       H120 
       V190 
       H90 Z"
    fill="url(#furniqoGrad)"/>

  <!-- Furniture hint (base platform) -->
  <rect x="90" y="170" width="100" height="14" rx="7"
        fill="url(#furniqoGrad)" opacity="0.9"/>

</svg>